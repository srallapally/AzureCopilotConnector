toolsInventoryFilePath.help=Local file path to inventory JSON. Dev/test only

httpTimeoutSeconds.display=HTTP Timeout (seconds)
httpTimeoutSeconds.help=HTTP connect and read timeout in seconds (default: 30)

logPayloads.display=Log Payloads
logPayloads.help=When true, log raw JSON payloads for debugging

# OPENICF-5005 begin
identityBindingScanEnabled.display=Identity Binding Scan Enabled
identityBindingScanEnabled.help=When true, the connector reads the identity binding inventory (from toolsInventoryUrl or toolsInventoryFilePath) and returns agentIdentityBinding objects. When false (default), agentIdentityBinding searches return no data regardless of inventory configuration.
# OPENICF-5005 end

# OPENICF-5013 begin
includeUnpublishedAgents.display=Include Unpublished Agents
includeUnpublishedAgents.help=When true, agents with no publish timestamp (never published / draft) are included in search results. When false (default), only published agents — those whose publishedon field is non-null — appear in reconciliations. UID lookups of unpublished agents return UnknownUidException when this flag is false.
# OPENICF-5013 end